name: MySQL Builder Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: retail_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: gradle

      - name: Make Gradle Executable
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew clean test
        env:
          ORG_GRADLE_PROJECT_dbUrl: jdbc:mysql://localhost:3306/retail_test
          ORG_GRADLE_PROJECT_dbUser: root
          ORG_GRADLE_PROJECT_dbPassword: root
        continue-on-error: true

      - name: Copy Categories
        if: always()
        run: |
          cp src/test/resources/categories.json build/allure-results/categories.json

      - name: Create Executor
        if: always()
        run: |
          cat > build/allure-results/executor.json <<EOF
          {
            "name":"GitHub Actions",
            "type":"github",
            "buildOrder":${{ github.run_number }},
            "buildName":"${{ github.workflow }}",
            "buildUrl":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

      # Restore previous report history
      - name: Checkout gh-pages
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      # Generate report with history
      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          gh_pages: gh-pages
          allure_results: build/allure-results
          allure_history: allure-history
          keep_reports: 20

      # Deploy report
      - name: Deploy Allure Report
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: allure-history
          clean: false
          single-commit: false

      - name: Verify History
        if: always()
        run: |
          echo "===== HISTORY ====="
          ls -R allure-history
          echo "===== LAST HISTORY ====="
          ls -R allure-history/last-history || true

      - name: Report Link
        if: always()
        run: |
          echo "=================================="
          echo "MySQL Builder Tests Completed"
          echo "=================================="
          echo "Allure Report:"
          echo "https://chaithra-03.github.io/gradle-ci/"