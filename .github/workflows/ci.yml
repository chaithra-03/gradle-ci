name: MySQL Builder Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

    permissions:
      contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: retail_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew test
        env:
          ORG_GRADLE_PROJECT_dbUrl: jdbc:mysql://localhost:3306/retail_test
          ORG_GRADLE_PROJECT_dbUser: root
          ORG_GRADLE_PROJECT_dbPassword: root
      
      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: build/allure-results
          allure_history: allure-history

      - name: Deploy Allure Report
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      - name: Report Link
        if: always()
        run: |
          echo "MySQL Builder Tests completed successfully."
          echo "Allure Report:"
          echo "https://chaithra-03.github.io/<gradle-ci>/"